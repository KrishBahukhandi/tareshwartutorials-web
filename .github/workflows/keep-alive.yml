name: Keep Render service awake

on:
  schedule:
    # Render's free tier spins down after ~15 min without traffic;
    # pinging every 10 min keeps the inactivity timer from firing.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --silent --show-error --fail --max-time 60 --retry 3 --retry-delay 10 \
            https://app.tareshwartutorials.com/up > /dev/null
          echo "Ping OK at $(date -u)"
